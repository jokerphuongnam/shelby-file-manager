services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: shelby-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    networks:
      - shelby-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: shelby-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_APTOS_NETWORK=testnet
      - NEXT_PUBLIC_SHELBY_RPC_URL=https://api.testnet.shelby.xyz
      - NEXT_PUBLIC_APP_NAME=Shelby File Manager
      - HOSTNAME=0.0.0.0
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shelby-network

volumes:
  backend_node_modules:
  frontend_node_modules:
  frontend_next_cache:

networks:
  shelby-network:
    driver: bridge
